name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build · typecheck · test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm) from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # apps/mcp imports the core's built dist/, so build core before typecheck/test.
      - run: pnpm -C packages/core build

      - run: pnpm -r typecheck
      - run: pnpm -r test
