name: MCP Registry Publish

# Publishes apps/mcp/server.json to the official MCP registry
# (registry.modelcontextprotocol.io). OIDC auth: workflows in this org are
# authorized for the io.github.almostjacked/* namespace automatically.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for mcp-publisher login github-oidc
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Publish to MCP registry
        working-directory: apps/mcp
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
